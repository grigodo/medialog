<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>미디어 로그</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="미디어 로그">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#4A90D9">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --accent:#4A90D9; --bg:#fff; --bg2:#f7f7f7;
    --border:#e8e8e8; --text:#0f1419; --text2:#536471; --text3:#8899a6;
    --card-radius:12px; --tab-h:60px; --header-h:56px;
  }
  body { font-family:'Malgun Gothic','맑은 고딕',Arial,sans-serif; background:#fff; color:#0f1419; height:100dvh; overflow:hidden; font-size:15px; }
  #app { display:flex; flex-direction:column; height:100dvh; width:100%; max-width:480px; margin:0 auto; position:relative; background:#fff; box-shadow:0 0 30px rgba(0,0,0,.08); }

  .header { height:var(--header-h); display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid var(--border); background:#fff; flex-shrink:0; }
  .header h1 { font-size:20px; font-weight:800; letter-spacing:-.3px; color:#0f1419; }
  .icon-btn { width:36px; height:36px; border:none; background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; color:#0f1419; }
  .icon-btn:hover { background:var(--bg2); }
  .icon-btn svg { width:20px; height:20px; }

  .content { flex:1; overflow-y:auto; overflow-x:hidden; }
  .page { display:none; }
  .page.active { display:block; }

  .tabbar { height:var(--tab-h); display:flex; border-top:1px solid var(--border); background:#fff; flex-shrink:0; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; border:none; background:none; color:var(--text3); font-family:inherit; font-size:11px; font-weight:600; transition:color .15s; }
  .tab.active { color:var(--accent); }
  .tab svg { width:22px; height:22px; }

  /* CALENDAR */
  .cal-nav { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; }
  .cal-title select { font-family:inherit; font-size:18px; font-weight:800; border:none; background:none; cursor:pointer; color:#0f1419; appearance:none; -webkit-appearance:none; }
  .cal-arrow { width:32px; height:32px; border:none; background:none; cursor:pointer; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--text2); }
  .cal-arrow:hover { background:var(--bg2); }
  .cal-grid { width:100%; table-layout:fixed; border-collapse:collapse; }
  .cal-grid th { font-size:12px; color:var(--text2); text-align:center; padding:4px 0 8px; font-weight:700; }
  .cal-grid { width:100%; table-layout:fixed; border-collapse:collapse; }
  .cal-grid td { text-align:center; vertical-align:top; padding:2px; border:none; width:calc(100%/7); }
  .cal-cell-inner { width:100%; display:flex; flex-direction:column; }
  .cal-day-num { font-size:12px; color:var(--text2); font-weight:600; margin-bottom:2px; display:block; flex-shrink:0; text-align:center; }
  .cal-day-num.today { background:var(--accent); color:#fff; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; margin:0 auto; }
  .cal-thumb-wrap { width:100%; aspect-ratio:1/1.414; overflow:hidden; border-radius:4px; position:relative; }
  .cal-thumb-single { width:100%; height:100%; object-fit:cover; border-radius:4px; display:block; }
  .cal-thumb-single-ph { width:100%; height:100%; background:var(--border); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .cal-thumb-grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; width:100%; height:100%; gap:1px; border-radius:4px; overflow:hidden; }
  .cal-thumb-grid img { width:100%; height:100%; object-fit:cover; display:block; }
  .cal-thumb-grid-ph { width:100%; height:100%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; }
  .cal-more-badge { position:absolute; bottom:2px; right:2px; background:rgba(0,0,0,.55); color:#fff; font-size:9px; padding:1px 4px; border-radius:3px; }

  /* LIBRARY */
  .lib-toolbar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
  .lib-filter { display:flex; gap:6px; }
  .filter-chip { padding:6px 14px; border-radius:20px; border:1px solid var(--border); font-size:13px; cursor:pointer; background:#fff; font-family:inherit; color:var(--text2); font-weight:500; }
  .filter-chip.active { background:#0f1419; color:#fff; border-color:#0f1419; }
  .view-btns { display:flex; gap:4px; }
  .view-btn { width:34px; height:34px; border:1px solid var(--border); background:#fff; border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text3); }
  .view-btn.active { background:#0f1419; color:#fff; border-color:#0f1419; }
  .view-btn svg { width:17px; height:17px; }
  .lib-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:16px; }
  .lib-grid-item { cursor:pointer; }
  .lib-cover { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:8px; display:block; }
  .lib-cover-placeholder { width:100%; aspect-ratio:2/3; background:var(--bg2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .lib-grid-title { font-size:12px; font-weight:600; color:#0f1419; margin-top:5px; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .lib-section-header { padding:10px 16px 6px; font-size:14px; font-weight:800; color:#0f1419; background:var(--bg2); border-bottom:1px solid var(--border); }
  .lib-list-item { display:flex; gap:14px; padding:16px; border-bottom:1px solid var(--border); cursor:pointer; align-items:flex-start; }
  .lib-list-cover { width:52px; height:76px; object-fit:cover; border-radius:6px; flex-shrink:0; }
  .lib-list-cover-ph { width:52px; height:76px; background:var(--bg2); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .lib-list-info { flex:1; min-width:0; }
  .lib-list-memo { font-size:14px; color:#0f1419; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
  .media-badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:700; margin-bottom:6px; }
  .badge-book { background:#EEF4FF; color:#4A90D9; }
  .badge-movie { background:#FFF3EE; color:#E8720C; }
  .badge-drama { background:#F0FFF4; color:#2D9E5F; }

  /* SEARCH */
  .search-bar { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:8px; }
  .search-input { flex:1; height:40px; border:1px solid var(--border); border-radius:10px; padding:0 14px; font-family:inherit; font-size:14px; outline:none; color:#0f1419; }
  .search-input:focus { border-color:var(--accent); }
  .search-btn { width:40px; height:40px; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .search-tabs { display:flex; border-bottom:1px solid var(--border); }
  .search-tab { flex:1; padding:10px; text-align:center; font-size:13px; cursor:pointer; border:none; background:none; font-family:inherit; color:var(--text2); border-bottom:2px solid transparent; }
  .search-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .search-result-item { display:flex; gap:12px; padding:10px 16px; border-bottom:1px solid var(--border); cursor:pointer; align-items:flex-start; }
  .search-result-item:hover { background:var(--bg2); }
  .search-result-cover { width:44px; height:64px; object-fit:cover; border-radius:6px; flex-shrink:0; background:var(--bg2); }
  .search-result-title { font-size:14px; font-weight:600; color:#0f1419; margin-bottom:3px; }
  .search-result-meta { font-size:11px; color:var(--text2); line-height:1.5; }
  .add-btn { width:32px; height:32px; border:1.5px solid var(--accent); color:var(--accent); background:#fff; border-radius:8px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
  .add-btn:hover { background:var(--accent); color:#fff; }
  .search-empty { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; }

  /* STATS */
  .stats-wrap { padding:16px; }
  .stats-year-nav { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:20px; }
  .stats-year { font-size:18px; font-weight:700; color:#0f1419; }
  .stats-card { background:var(--bg2); border-radius:var(--card-radius); padding:16px; margin-bottom:14px; }
  .stats-card-title { font-size:12px; color:var(--text2); margin-bottom:10px; font-weight:600; }
  .stats-big { display:flex; align-items:baseline; gap:4px; }
  .stats-num { font-size:36px; font-weight:700; color:#0f1419; }
  .stats-unit { font-size:14px; color:var(--text2); }
  .stats-row { display:flex; gap:10px; margin-bottom:14px; }
  .stats-row .stats-card { flex:1; margin-bottom:0; }
  .bar-chart { display:flex; align-items:flex-end; gap:4px; height:80px; margin-top:8px; }
  .bar-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; height:100%; justify-content:flex-end; }
  .bar { width:100%; background:var(--accent); border-radius:3px 3px 0 0; min-height:2px; }
  .bar-label { font-size:9px; color:var(--text3); }
  .bar-val { font-size:9px; color:var(--text2); }

  /* SETTINGS */
  .settings-wrap { padding:16px; }
  .settings-section { margin-bottom:24px; }
  .settings-section-title { font-size:12px; color:var(--text2); font-weight:700; margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
  .settings-item { background:var(--bg2); border-radius:var(--card-radius); overflow:hidden; margin-bottom:8px; }
  .settings-row { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); gap:12px; }
  .settings-row:last-child { border-bottom:none; }
  .settings-row-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .settings-row-label { font-size:14px; font-weight:500; color:#0f1419; }
  .settings-row-sub { font-size:11px; color:var(--text2); margin-top:1px; }
  .settings-row-action svg { width:16px; height:16px; color:var(--text3); }
  .settings-input { width:100%; border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-family:inherit; font-size:13px; outline:none; margin-top:6px; color:#0f1419; }
  .settings-input:focus { border-color:var(--accent); }
  .btn { padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-secondary { background:#fff; color:#0f1419; border:1px solid var(--border); }
  .btn-danger { background:#fee; color:#c00; border:1px solid #fcc; }
  .btn-full { width:100%; margin-top:8px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#fff; border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:90dvh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom,0px); }
  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 0; }
  .modal-title { font-size:16px; font-weight:700; color:#0f1419; }
  .modal-close { width:32px; height:32px; border:none; background:none; cursor:pointer; font-size:20px; color:var(--text2); display:flex; align-items:center; justify-content:center; border-radius:8px; }
  .modal-body { padding:16px; }
  .detail-cover { width:80px; height:120px; object-fit:cover; border-radius:8px; flex-shrink:0; }
  .detail-cover-ph { width:80px; height:120px; background:var(--bg2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; }
  .form-group { margin-bottom:14px; }
  .form-label { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:5px; display:block; }
  .form-input { width:100%; border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-family:inherit; font-size:14px; outline:none; color:#0f1419; }
  .form-input:focus { border-color:var(--accent); }
  .form-textarea { width:100%; border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-family:inherit; font-size:14px; outline:none; resize:none; height:80px; color:#0f1419; }
  .form-textarea:focus { border-color:var(--accent); }
  .star-row { display:flex; gap:4px; }
  .star { font-size:24px; cursor:pointer; color:var(--text3); transition:color .1s; }
  .star.on { color:#f5a623; }
  .modal-footer { display:flex; gap:8px; padding:0 16px 20px; }
  .modal-footer .btn { flex:1; }

  /* TOAST */
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:#222; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:all .3s; pointer-events:none; z-index:200; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .empty { text-align:center; padding:60px 20px; color:var(--text3); }
  .empty svg { width:48px; height:48px; margin-bottom:12px; opacity:.3; }
  .empty p { font-size:14px; }
  .loading { text-align:center; padding:30px; color:var(--text3); font-size:13px; }
  .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .ptr-indicator { position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:center; height:50px; transform:translateY(-50px); transition:transform .2s; z-index:50; background:#fff; font-size:12px; color:var(--text2); gap:6px; }
  .ptr-indicator.visible { transform:translateY(0); }
  .ptr-spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; }
  .ptr-spinner.spin { animation:spin .7s linear infinite; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1 id="header-title">캘린더</h1>
    <button class="icon-btn" id="btn-add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </button>
  </div>

  <div class="ptr-indicator" id="ptr-indicator">
    <div class="ptr-spinner" id="ptr-spinner"></div>
    <span id="ptr-text">당겨서 새로고침</span>
  </div>

  <div class="content" id="content">
    <!-- CALENDAR -->
    <div class="page active" id="page-calendar">
      <div class="cal-nav">
        <div class="cal-title" style="display:flex;align-items:center;gap:6px">
          <select id="cal-year-sel"></select>
          <select id="cal-month-sel"></select>
        </div>
        <div style="display:flex;gap:4px">
          <button class="cal-arrow" id="cal-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="cal-arrow" id="cal-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
      <div style="display:flex;gap:6px;padding:0 16px 10px">
        <button class="filter-chip active" data-calfilter="all">전체</button>
        <button class="filter-chip" data-calfilter="book">책</button>
        <button class="filter-chip" data-calfilter="screen">영화·드라마</button>
      </div>
      <table class="cal-grid">
        <thead><tr id="cal-head"></tr></thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>

    <!-- LIBRARY -->
    <div class="page" id="page-library">
      <div class="lib-toolbar">
        <div class="lib-filter">
          <button class="filter-chip active" data-filter="all">전체</button>
          <button class="filter-chip" data-filter="book">책</button>
          <button class="filter-chip" data-filter="movie">영화</button>
          <button class="filter-chip" data-filter="drama">드라마</button>
        </div>
        <div class="view-btns">
          <button class="view-btn" id="btn-grid-view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn active" id="btn-list-view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div id="lib-content"></div>
    </div>

    <!-- SEARCH -->
    <div class="page" id="page-search">
      <div class="search-bar">
        <input class="search-input" id="search-input" type="text" placeholder="책, 영화, 드라마 검색..."/>
        <button class="search-btn" id="search-do">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <div class="search-tabs">
        <button class="search-tab active" data-type="book">책</button>
        <button class="search-tab" data-type="movie">영화</button>
        <button class="search-tab" data-type="drama">드라마</button>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- STATS -->
    <div class="page" id="page-stats">
      <div class="stats-wrap">
        <div class="stats-year-nav">
          <button class="cal-arrow" id="stats-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="stats-year" id="stats-year-label"></span>
          <button class="cal-arrow" id="stats-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <div id="stats-content"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="page-settings">
      <div class="settings-wrap">
        <div class="settings-section">
          <div class="settings-section-title">Google Drive 동기화</div>
          <div class="settings-item">
            <div class="settings-row">
              <div class="settings-row-icon" style="background:#e8f0fe">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2"><path d="M22 12.5V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h9"/><path d="M22 20l-5-5"/><path d="M22 15h-5v5"/></svg>
              </div>
              <div class="settings-row-body" style="flex:1">
                <div class="settings-row-label">Google Drive 연동</div>
                <div class="settings-row-sub">버튼으로 수동 저장·불러오기</div>
              </div>
            </div>
            <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px">
              <button class="btn btn-primary btn-full" id="btn-drive-save" style="margin-top:8px">⬆ Drive에 저장</button>
              <button class="btn btn-secondary btn-full" id="btn-drive-load">⬇ Drive에서 불러오기</button>
              <label class="form-label" style="margin-top:6px">Google OAuth Client ID</label>
              <input class="settings-input" id="input-google-client-id" placeholder="xxxx.apps.googleusercontent.com" style="margin-top:0"/>
              <button class="btn btn-secondary btn-full" id="btn-save-google-id" style="margin-top:0">Client ID 저장</button>
            </div>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">API 키 설정</div>
          <div class="settings-item">
            <div style="padding:14px 16px 0">
              <label class="form-label">카카오 REST API 키 (책 검색)</label>
              <input class="settings-input" id="input-kakao-key" type="password" placeholder="카카오 REST API 키 입력"/>
            </div>
            <div style="padding:10px 16px 0">
              <label class="form-label">TMDB API 키 (영화·드라마 검색)</label>
              <input class="settings-input" id="input-tmdb-key" type="password" placeholder="TMDB API 키 입력"/>
            </div>
            <div style="padding:10px 16px 16px">
              <button class="btn btn-primary btn-full" id="btn-save-keys" style="margin-top:0">API 키 저장</button>
            </div>
          </div>
        </div>

        <div class="settings-section">

<script>
const STORAGE_KEY = 'medialog_v1';
const SETTINGS_KEY = 'medialog_settings';
let state = { records: [] };
let settings = { kakaoKey:'', tmdbKey:'', googleClientId:'' };
let curPage = 'calendar';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calFilter = 'all';
let statsYear = new Date().getFullYear();
let libView = 'list';
let libFilter = 'all';
let searchType = 'book';
let currentRating = 0;
let editingRecord = null;
let pendingItem = null;
let gisToken = null;
let driveFileId = null;
let detailNewCover = null;
let detailSearchResults = [];
const DRIVE_FILE_NAME = 'medialog_data.json';
const GIS_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';

function loadState() {
  try { const d=localStorage.getItem(STORAGE_KEY); if(d) state=JSON.parse(d); } catch(e){}
  try { const d=localStorage.getItem(SETTINGS_KEY); if(d) settings={...settings,...JSON.parse(d)}; } catch(e){}
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }

// ── NAVIGATION ──
const pageNames = { calendar:'캘린더', library:'서재', search:'검색', stats:'통계', settings:'설정' };
function goPage(p) {
  curPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id==='page-'+p));
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.page===p));
  document.getElementById('header-title').textContent = pageNames[p];
    // 캘린더 페이지일 때 헤더 숨기기
  document.querySelector('.header').style.display = p === 'calendar' ? 'none' : '';
  if(p==='calendar') renderCalendar();
  if(p==='library') renderLibrary();
  if(p==='stats') renderStats();
  if(p==='settings') loadSettingsUI();
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => goPage(t.dataset.page)));

// ── CALENDAR FILTER ──
document.querySelectorAll('[data-calfilter]').forEach(c => c.addEventListener('click', function() {
  document.querySelectorAll('[data-calfilter]').forEach(x => x.classList.remove('active'));
  this.classList.add('active');
  calFilter = this.dataset.calfilter;
  renderCalendar();
}));

// ── CALENDAR ──
function buildCalSelectors() {
  const ySel = document.getElementById('cal-year-sel');
  const mSel = document.getElementById('cal-month-sel');
  ySel.innerHTML = '';
  const now = new Date().getFullYear();
  for(let y=now+1; y>=2000; y--) {
    const o = document.createElement('option');
    o.value=y; o.textContent=y+'년'; if(y===calYear) o.selected=true;
    ySel.appendChild(o);
  }
  mSel.innerHTML = '';
  ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].forEach((m,i) => {
    const o = document.createElement('option');
    o.value=i; o.textContent=m; if(i===calMonth) o.selected=true;
    mSel.appendChild(o);
  });
  ySel.onchange = () => { calYear=+ySel.value; renderCalendar(); };
  mSel.onchange = () => { calMonth=+mSel.value; renderCalendar(); };
}
function renderCalendar() {
  buildCalSelectors();
  const head = document.getElementById('cal-head');
  const body = document.getElementById('cal-body');
  const days = ['월','화','수','목','금','토','일'];
  head.innerHTML = days.map((d,i) => `<th style="${i===5?'color:var(--accent)':i===6?'color:#e05':''}">${d}</th>`).join('');
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const startOffset = (firstDay+6)%7;
  const byDate = {};
  state.records.forEach(r => {
    if(calFilter==='book' && r.type!=='book') return;
    if(calFilter==='screen' && r.type==='book') return;
    const d = r.date ? r.date.slice(0,10) : '';
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(r);
  });
  let html='', dayCount=1;
  const totalCells = Math.ceil((startOffset+daysInMonth)/7)*7;
  for(let i=0; i<totalCells; i+=7) {
    html += '<tr>';
    for(let j=0; j<7; j++) {
      const cell=i+j;
      if(cell<startOffset || dayCount>daysInMonth) { html+='<td><div class="cal-cell-inner"><div class="cal-thumb-wrap" style="visibility:hidden"></div></div></td>'; continue; }
      const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(dayCount).padStart(2,'0')}`;
      const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===dayCount;
      const recs=byDate[dateStr]||[];
      const numStr=isToday?`<span class="cal-day-num today">${dayCount}</span>`:`<span class="cal-day-num">${dayCount}</span>`;
      let thumbHtml='';
      if(recs.length===1) {
        const r=recs[0];
        thumbHtml=`<div class="cal-thumb-wrap">${r.cover?`<img class="cal-thumb-single" src="${r.cover}" loading="lazy" onerror="this.style.display='none'">`:`<div class="cal-thumb-single-ph">${r.type==='book'?'📖':r.type==='movie'?'🎬':'📺'}</div>`}</div>`;
      } else if(recs.length>1) {
        const show=recs.slice(0,4), extra=recs.length>4?recs.length-4:0;
        const cells=show.map(r=>r.cover?`<img src="${r.cover}" loading="lazy">`:`<div class="cal-thumb-grid-ph">${r.type==='book'?'📖':r.type==='movie'?'🎬':'📺'}</div>`).join('');
        thumbHtml=`<div class="cal-thumb-wrap"><div class="cal-thumb-grid">${cells}</div>${extra?`<span class="cal-more-badge">+${extra}</span>`:''}</div>`;
      }
      html+=`<td style="cursor:${recs.length?'pointer':'default'}" onclick="calDayClick('${dateStr}')"><div class="cal-cell-inner">${numStr}${thumbHtml||'<div class="cal-thumb-wrap" style="visibility:hidden"></div>'}</div></td>`;
      dayCount++;
    }
    html+='</tr>';
  }
  body.innerHTML=html;
}
function calDayClick(dateStr) {
  const recs=state.records.filter(r=>r.date&&r.date.slice(0,10)===dateStr);
  if(!recs.length) return;
  if(recs.length===1) { openDetailModal(recs[0]); return; }
  document.getElementById('modal-title-text').textContent=dateStr.replace(/-/g,'.');
  document.getElementById('modal-body').innerHTML=recs.map(r=>`
    <div onclick="openDetailModal(state.records.find(x=>x.id==='${r.id}'))" style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:center">
      ${r.cover?`<img src="${r.cover}" style="width:36px;height:52px;object-fit:cover;border-radius:4px">`:`<div style="width:36px;height:52px;background:var(--bg2);border-radius:4px;display:flex;align-items:center;justify-content:center">${r.type==='book'?'📖':r.type==='movie'?'🎬':'📺'}</div>`}
      <div><div style="font-size:14px;font-weight:700;color:#0f1419">${r.title}</div><div style="font-size:11px;color:var(--text2)">${r.creator||''}</div></div>
    </div>`).join('');
  document.getElementById('modal-footer').innerHTML='';
  openModal();
}
document.getElementById('cal-prev').onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
document.getElementById('cal-next').onclick=()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };

// ── LIBRARY ──
document.getElementById('btn-grid-view').onclick=()=>{ libView='grid'; document.getElementById('btn-grid-view').classList.add('active'); document.getElementById('btn-list-view').classList.remove('active'); renderLibrary(); };
document.getElementById('btn-list-view').onclick=()=>{ libView='list'; document.getElementById('btn-list-view').classList.add('active'); document.getElementById('btn-grid-view').classList.remove('active'); renderLibrary(); };
document.querySelectorAll('.filter-chip[data-filter]').forEach(c=>c.addEventListener('click',function(){
  document.querySelectorAll('.filter-chip[data-filter]').forEach(x=>x.classList.remove('active'));
  this.classList.add('active'); libFilter=this.dataset.filter; renderLibrary();
}));
function getFiltered() {
  let r=[...state.records];
  if(libFilter!=='all') r=r.filter(x=>x.type===libFilter);
  return r.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}
function renderLibrary() {
  const cont=document.getElementById('lib-content');
  const recs=getFiltered();
  if(!recs.length) { cont.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><p>기록이 없어요</p></div>`; return; }
  if(libView==='grid') {
    cont.innerHTML=`<div class="lib-grid">${recs.map(r=>`
      <div class="lib-grid-item" onclick="openDetailModal(state.records.find(x=>x.id==='${r.id}'))">
        ${r.cover?`<img class="lib-cover" src="${r.cover}" loading="lazy">`:`<div class="lib-cover-placeholder">${r.type==='book'?'📖':r.type==='movie'?'🎬':'📺'}</div>`}
        <div class="lib-grid-title">${r.title}</div>
      </div>`).join('')}</div>`;
  } else {
    const grouped={};
    recs.forEach(r=>{ const k=r.date?r.date.slice(0,7):'날짜 없음'; if(!grouped[k])grouped[k]=[]; grouped[k].push(r); });
    let html='';
    Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(k=>{
      const label=k==='날짜 없음'?k:k.replace('-','년 ')+'월';
      html+=`<div class="lib-section-header">${label}</div>`;
      grouped[k].forEach(r=>{
        const stars=r.rating?'★'.repeat(r.rating)+'☆'.repeat(5-r.rating):'';
        html+=`<div class="lib-list-item" onclick="openDetailModal(state.records.find(x=>x.id==='${r.id}'))">
          ${r.cover?`<img class="lib-list-cover" src="${r.cover}" loading="lazy">`:`<div class="lib-list-cover-ph">${r.type==='book'?'📖':r.type==='movie'?'🎬':'📺'}</div>`}
          <div class="lib-list-info">
            <span class="media-badge badge-${r.type}" style="color:${r.type==='book'?'#4A90D9':r.type==='movie'?'#E8720C':'#2D9E5F'}">${r.type==='book'?'책':r.type==='movie'?'영화':'드라마'}</span>
            <div style="font-size:16px;font-weight:800;color:#0f1419;line-height:1.3;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.title}</div>
            <div style="font-size:13px;color:#536471;font-weight:600;margin-bottom:6px">${r.creator||''}${stars?' · '+stars:''}</div>
            ${r.memo?`<div class="lib-list-memo">${r.memo}</div>`:''}
          </div>
          <div style="font-size:13px;color:#536471;white-space:nowrap;flex-shrink:0;margin-top:2px;font-weight:700">${r.date?r.date.slice(5,10).replace('-','/'):''}</div>
        </div>`;
      });
    });
    cont.innerHTML=html;
  }
}

// ── SEARCH ──
document.querySelectorAll('.search-tab').forEach(t=>t.addEventListener('click',function(){
  document.querySelectorAll('.search-tab').forEach(x=>x.classList.remove('active'));
  this.classList.add('active'); searchType=this.dataset.type;
  document.getElementById('search-results').innerHTML='';
}));
document.getElementById('search-do').onclick=doSearch;
document.getElementById('search-input').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });
async function doSearch() {
  const q=document.getElementById('search-input').value.trim();
  if(!q) return;
  const res=document.getElementById('search-results');
  res.innerHTML='<div class="loading"><div class="spinner"></div>검색 중...</div>';
  try {
    if(searchType==='book') await searchBooks(q);
    else await searchTmdb(q, searchType);
  } catch(e) { res.innerHTML=`<div class="search-empty">오류: ${e.message}</div>`; }
}
async function searchBooks(q) {
  if(!settings.kakaoKey) { document.getElementById('search-results').innerHTML='<div class="search-empty">설정에서 카카오 API 키를 입력해주세요.</div>'; return; }
  const resp=await fetch(`https://dapi.kakao.com/v3/search/book?query=${encodeURIComponent(q)}&size=15`,{headers:{Authorization:`KakaoAK ${settings.kakaoKey}`}});
  if(!resp.ok) throw new Error('카카오 API 오류 '+resp.status);
  const data=await resp.json();
  renderSearchResults(data.documents.map(b=>({type:'book',title:b.title,creator:b.authors?.join(', ')||'',cover:b.thumbnail,meta:`${b.publisher||''} · ${b.datetime?.slice(0,4)||''}`,extra:b})));
}
async function searchTmdb(q, type) {
  if(!settings.tmdbKey) { document.getElementById('search-results').innerHTML='<div class="search-empty">설정에서 TMDB API 키를 입력해주세요.</div>'; return; }
  const ep=type==='movie'?'movie':'tv';
  const resp=await fetch(`https://api.themoviedb.org/3/search/${ep}?api_key=${settings.tmdbKey}&query=${encodeURIComponent(q)}&language=ko-KR`);
  if(!resp.ok) throw new Error('TMDB API 오류 '+resp.status);
  const data=await resp.json();
  renderSearchResults(data.results.map(m=>({type,title:m.title||m.name,creator:'',cover:m.poster_path?`https://image.tmdb.org/t/p/w185${m.poster_path}`:'',meta:`${(m.release_date||m.first_air_date||'').slice(0,4)} · ⭐${m.vote_average?.toFixed(1)||'-'}`,extra:m})));
}
function renderSearchResults(items) {
  const res=document.getElementById('search-results');
  if(!items.length) { res.innerHTML='<div class="search-empty">검색 결과가 없어요.</div>'; return; }

function toggleDetailSearch() {
  const box = document.getElementById('detail-book-search');
  if(!box) return;
  const isHidden = box.style.display === 'none';
  box.style.display = isHidden ? 'block' : 'none';
  if(isHidden) {
    const input = document.getElementById('detail-search-input');
    const title = document.getElementById('f-title')?.value.trim();
    if(input) {
      if(title) { input.value = title; doDetailBookSearch(); }
      else { input.focus(); }
    }
  }
}

async function doDetailBookSearch() {
  if(!settings.kakaoKey) { showToast('설정에서 카카오 API 키를 입력해주세요'); return; }
  const q = document.getElementById('detail-search-input')?.value.trim();
  if(!q) return;
  const resEl = document.getElementById('detail-search-results');
  if(!resEl) return;
  resEl.innerHTML = '<div style="text-align:center;padding:12px;color:#888;font-size:13px">검색 중...</div>';
  try {
    const resp = await fetch(`https://dapi.kakao.com/v3/search/book?query=${encodeURIComponent(q)}&size=5`, {
      headers: { Authorization: `KakaoAK ${settings.kakaoKey}` }
    });
    if(!resp.ok) throw new Error('카카오 API 오류');
    const data = await resp.json();
    detailSearchResults = data.documents || [];
    if(!detailSearchResults.length) { resEl.innerHTML='<div style="text-align:center;padding:12px;color:#888;font-size:13px">결과 없음</div>'; return; }
    resEl.innerHTML = detailSearchResults.map((b,i) => `
      <div onclick="applyDetailBook(${i})" style="display:flex;gap:10px;padding:8px;border-radius:8px;cursor:pointer;border:1px solid #e8e8e8;margin-bottom:6px;background:#fff"
        onmouseover="this.style.background='#f0f7ff'" onmouseout="this.style.background='#fff'">
        ${b.thumbnail?`<img src="${b.thumbnail}" style="width:36px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0">`:`<div style="width:36px;height:52px;background:#f7f7f7;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0">📖</div>`}
        <div style="min-width:0">
          <div style="font-size:13px;font-weight:700;color:#0f1419;line-height:1.3;margin-bottom:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${b.title}</div>
          <div style="font-size:11px;color:#536471">${b.authors?.join(', ')||''}</div>
        </div>
      </div>`).join('');
  } catch(e) {
    resEl.innerHTML=`<div style="text-align:center;padding:12px;color:#e00;font-size:13px">${e.message}</div>`;
  }
}

function applyDetailBook(i) {
  const b = detailSearchResults[i];
  if(!b) return;
  const titleEl = document.getElementById('f-title');
  const creatorEl = document.getElementById('f-creator');
  if(titleEl) titleEl.value = b.title || '';
  if(creatorEl) creatorEl.value = b.authors?.join(', ') || '';
  if(b.thumbnail) {
    detailNewCover = b.thumbnail;
    const coverEl = document.getElementById('detail-cover-img');
    if(coverEl) coverEl.outerHTML = `<img id="detail-cover-img" class="detail-cover" src="${b.thumbnail}">`;
  }
  const box = document.getElementById('detail-book-search');
  if(box) box.style.display = 'none';
  showToast('책 정보 적용됨 ✓');
}

function saveRecord() {
  const title=document.getElementById('f-title')?.value.trim()||(editingRecord?state.records.find(r=>r.id===editingRecord)?.title:'');
  if(!title) { showToast('제목을 입력해주세요'); return; }
  if(editingRecord) {
    const rec=state.records.find(r=>r.id===editingRecord);
    if(rec) {
      rec.title=title;
      rec.creator=document.getElementById('f-creator')?.value||'';
      rec.date=document.getElementById('f-date')?.value||rec.date;
      rec.memo=document.getElementById('f-memo')?.value||'';
      rec.rating=currentRating;
      if(detailNewCover) { rec.cover=detailNewCover; detailNewCover=null; }
    }
  } else {
    state.records.push({
      id: Date.now().toString(),
      type: document.getElementById('f-type')?.value||'book',
      title,
      creator: document.getElementById('f-creator')?.value||'',
      date: document.getElementById('f-date')?.value||'',
      memo: document.getElementById('f-memo')?.value||'',
      rating: currentRating,

      extra: pendingItem?.extra||null

  if(curPage==='library') renderLibrary();

function exportTxt() {
  if(!state.records.length) { showToast('기록이 없어요'); return; }
  const lines=state.records.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(r=>`[${r.type==='book'?'책':r.type==='movie'?'영화':'드라마'}] ${r.title}\n저자/감독: ${r.creator||'-'}\n감상일: ${r.date||'-'}\n별점: ${'★'.repeat(r.rating||0)+'☆'.repeat(5-(r.rating||0))}\n감상: ${r.memo||'-'}\n`);
  download('미디어로그.txt', lines.join('\n---\n\n'), 'text/plain');
  showToast('TXT 저장됨 ✓');
}
function exportCsv() {
  if(!state.records.length) { showToast('기록이 없어요'); return; }
  const header='종류,제목,저자/감독,감상일,별점,감상\n';
  const rows=state.records.map(r=>[r.type==='book'?'책':r.type==='movie'?'영화':'드라마',r.title,r.creator||'',r.date||'',r.rating||'',r.memo||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  download('미디어로그.csv', '\uFEFF'+header+rows.join('\n'), 'text/csv');
  showToast('CSV 저장됨 ✓');
}
function backupJson() {
  if(!state.records.length) { showToast('백업할 기록이 없어요'); return; }
  const date=new Date().toISOString().slice(0,10);
  download(`medialog_backup_${date}.json`, JSON.stringify(state,null,2), 'application/json');
  showToast('백업 파일 저장됨 ✓');
}
function restoreJson(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try {
      const data=JSON.parse(ev.target.result);
      if(!data.records||!Array.isArray(data.records)) throw new Error('올바른 백업 파일이 아니에요');
      if(!confirm(`백업 파일에 기록 ${data.records.length}개가 있어요.\n현재 데이터에 합쳐서 불러올까요?`)) return;
      const existingIds=new Set(state.records.map(r=>r.id));
      const newRecs=data.records.filter(r=>!existingIds.has(r.id));
      state.records=[...state.records,...newRecs];
      saveState(); showToast(`${newRecs.length}개 기록 복구됨 ✓`);
      if(curPage==='calendar') renderCalendar();
      if(curPage==='library') renderLibrary();
    } catch(err) { showToast('파일 오류: '+err.message); }
    e.target.value='';
  };
  reader.readAsText(file);
}
function download(name, content, type) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
}

// ── CSV IMPORT ──
function parseDate(raw) {
  if(!raw) return '';
  const s=raw.trim();
  let m;
  m=s.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/^(\d{2})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if(m) return `20${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/^(\d{2})\s+(\d{1,2})\s+(\d{1,2})$/);
  if(m) return `20${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/^(\d{4})[.\-\/](\d{1,2})$/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-01`;
  return '';
}
function parseCsvLine(line) {
  const result=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++) {
    const ch=line[i];
    if(ch==='"') { if(inQ&&line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if(ch===','&&!inQ) { result.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  result.push(cur.trim());
  return result;
}
function importCsv(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try {
      const text=ev.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2) { showToast('데이터가 없어요'); return; }
      const headers=parseCsvLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
      const idx=(names)=>{
        for(const n of names) { const i=headers.findIndex(h=>h.includes(n)); if(i>=0) return i; }
        return -1;
      };
      const isBooKit=idx(['독서상태'])>=0||idx(['읽은 날짜'])>=0;
      const iTitle=idx(['제목']);
      const iCreator=idx(['작가','저자','감독']);
      const iMemo=idx(['감상','메모1','메모','리뷰']);
      const iRating=idx(['표지','별점','평점','rating']);
      const iStatus=idx(['독서상태']);
      const iDate=isBooKit?idx(['읽은 날짜']):idx(['날짜']);
      if(iTitle<0) { showToast('제목 컬럼을 찾을 수 없어요'); return; }
      const newRecs=[]; let skippedStatus=0;
      lines.slice(1).forEach((line,li)=>{
        if(!line.trim()) return;
        const cols=parseCsvLine(line);
        const title=cols[iTitle]?.replace(/^"|"$/g,'').trim();
        if(!title) return;
        if(isBooKit&&iStatus>=0) {
          const status=cols[iStatus]?.replace(/^"|"$/g,'').trim();
          if(status!=='읽은 책') { skippedStatus++; return; }
        }
        const dateRaw=iDate>=0?cols[iDate]?.replace(/^"|"$/g,'').trim():'';
        const creator=iCreator>=0?cols[iCreator]?.replace(/^"|"$/g,'').trim():'';
        const memoRaw=iMemo>=0?cols[iMemo]?.replace(/^"|"$/g,'').trim():'';
        const ratingRaw=iRating>=0?cols[iRating]?.replace(/^"|"$/g,'').trim():'';
        const rating=Math.min(5,Math.max(0,Math.round(parseFloat(ratingRaw)||0)));
        const date=parseDate(dateRaw);
        if(state.records.some(r=>r.title===title)) return;
        newRecs.push({ id:(Date.now()+li).toString(), type:'book', title, creator, date, memo:memoRaw, rating, cover:'', extra:null });
      });
      if(!newRecs.length) { showToast(skippedStatus>0?`새로운 기록이 없어요 (미완독 ${skippedStatus}개 제외)`:'새로운 기록이 없어요 (모두 중복)'); return; }
      const detail=isBooKit&&skippedStatus>0?`\n(미완독 ${skippedStatus}개 제외)`:'';
      if(!confirm(`${newRecs.length}개 책 기록을 가져올까요?${detail}`)) return;
      state.records=[...state.records,...newRecs];
      saveState(); showToast(`${newRecs.length}개 기록 추가됨 ✓`);
      if(curPage==='calendar') renderCalendar();
      if(curPage==='library') renderLibrary();
    } catch(err) { showToast('파일 오류: '+err.message); console.error(err); }
    e.target.value='';
  };
  reader.readAsText(file,'utf-8');
}

// ── GOOGLE DRIVE ──
function loadGisScript() {
  return new Promise(res=>{
    if(window.google?.accounts){res();return;}
    const s=document.createElement('script'); s.src='https://accounts.google.com/gsi/client'; s.onload=res; document.head.appendChild(s);
  });
}
async function requestTokenThen(callback) {
  await loadGisScript();
  const client=google.accounts.oauth2.initTokenClient({
    client_id:settings.googleClientId, scope:GIS_SCOPE,
    callback:async(resp)=>{ if(resp.error){showToast('로그인 실패: '+resp.error);return;} gisToken=resp.access_token; await callback(); }
  });
  client.requestAccessToken();
}
async function syncDrive() {
  if(!gisToken) return;
  try {
    const content=JSON.stringify(state);
    if(!driveFileId) driveFileId=await findDriveFile();
    if(driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${gisToken}`,'Content-Type':'application/json'},body:content});
    } else {
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:DRIVE_FILE_NAME,parents:['appDataFolder']})],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${gisToken}`},body:form});
      const d=await r.json(); driveFileId=d.id;
    }
  } catch(e){console.warn('Drive sync failed',e);}
}
async function findDriveFile() {
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'`,{headers:{Authorization:`Bearer ${gisToken}`}});
  const d=await r.json(); return d.files?.[0]?.id||null;
}
async function loadFromDrive() {
  try {
    if(!driveFileId) driveFileId=await findDriveFile();
    if(!driveFileId){showToast('Drive에 저장된 데이터가 없어요');return;}
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{headers:{Authorization:`Bearer ${gisToken}`}});
    const d=await r.json();
    if(d.records){state=d;saveState();renderCalendar();showToast('Drive에서 불러왔어요 ✓');}
  } catch(e){console.warn('Drive load failed',e);showToast('불러오기 실패');}
}

// ── PULL TO REFRESH ──
(()=>{
  const content=document.getElementById('content');
  const indicator=document.getElementById('ptr-indicator');
  const spinner=document.getElementById('ptr-spinner');
  const ptrText=document.getElementById('ptr-text');
  let startY=0, pulling=false, triggered=false;
  const THRESHOLD=80;
  content.addEventListener('touchstart',e=>{ if(content.scrollTop===0){startY=e.touches[0].clientY;pulling=true;triggered=false;} },{passive:true});
  content.addEventListener('touchmove',e=>{
    if(!pulling) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>0) {
      indicator.classList.add('visible');
      indicator.style.transform=`translateY(${Math.min(dy*.5,50)}px)`;
      if(dy>=THRESHOLD&&!triggered){triggered=true;ptrText.textContent='놓으면 새로고침';}
      else if(dy<THRESHOLD){ptrText.textContent='당겨서 새로고침';}
    }
  },{passive:true});
  content.addEventListener('touchend',()=>{
    if(!pulling) return;
    pulling=false;
    if(triggered) {
      spinner.classList.add('spin'); ptrText.textContent='새로고침 중...'; indicator.style.transform='translateY(50px)';
      setTimeout(()=>{
        if(curPage==='calendar') renderCalendar();
        if(curPage==='library') renderLibrary();
        if(curPage==='stats') renderStats();
        spinner.classList.remove('spin'); indicator.classList.remove('visible'); indicator.style.transform=''; ptrText.textContent='당겨서 새로고침';
      },800);
    } else { indicator.classList.remove('visible'); indicator.style.transform=''; }
  });
})();

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadState();
document.querySelector('.header').style.display = 'none';
renderCalendar();
</script>
